<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Complaints - Public Complaints System</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body onload="displayCitizenComplaints()">
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>My Complaints</h1>
            <p class="dashboard-subtitle">Track the progress of your submitted complaints</p>
        </header>

        <div class="table-container">
            <h2>My Notifications</h2>
            <div id="citizenNotifications" class="notification-list"></div>
        </div>

        <div class="table-container">
            <h2>My Submitted Complaints</h2>
            <table id="citizenComplaintsTable" class="complaints-table">
                <thead>
                    <tr>
                        <th>Complaint ID</th>
                        <th>Category</th>
                        <th>Area / City</th>
                        <th>Problem Description</th>
                        <th>Supports</th>
                        <th>Status</th>
                        <th>Progress</th>
                        <th>Resolution Time</th>
                        <th>Evidence</th>
                        <th>Submitted Date</th>
                    </tr>
                </thead>
                <tbody id="citizenComplaintsTableBody"></tbody>
            </table>
        </div>

        <div class="dashboard-actions">
            <button class="btn btn-primary" onclick="window.location.href='problems.html'">Submit New Complaint</button>
            <a class="btn btn-secondary" href="publicTransparency.html">View Public Transparency</a>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </div>
</body>
</html>
